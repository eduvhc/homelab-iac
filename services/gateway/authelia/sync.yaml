# Render+push spec for Authelia. The previously-shell-only argon2id
# password hash management is now a typed pre_run hook handled by the
# Go engine — no shell wrapper needed.
#
# The two config files use atomic_push because Authelia watches the
# directory (configuration.yml.tmpl sets
# `authentication_backend.file.watch: true`) — readers must never see a
# truncated mid-scp state.

host: gateway

# Regenerate the argon2id hash of HOMELAB_ADMIN_PASSWORD on the gateway
# (where the authelia binary lives) only when the source password
# changed. Hash + sha256 marker are persisted to sops; the freshly
# exported HOMELAB_ADMIN_PWHASH env var feeds the users_database.yml.tmpl
# envsubst below. argon2id is non-deterministic, so the marker is what
# prevents spurious sops drift on every apply.
pre_run:
  - type: argon2id_hash
    source_env: HOMELAB_ADMIN_PASSWORD
    target_sops_key: HOMELAB_ADMIN_PWHASH
    marker_sops_key: HOMELAB_ADMIN_PWHASH_SRC
    remote_command: "authelia crypto hash generate argon2 --password '{password}'"
    output_match: "^Digest: (.+)$"

files:
  - src: target/configuration.yml.tmpl
    dest: /etc/authelia/configuration.yml
    envsubst: [HOMELAB_DOMAIN]
    owner: authelia:authelia
    mode: "0640"
    atomic: true
    on_change:
      - restart: authelia.service

  - src: target/users_database.yml.tmpl
    dest: /etc/authelia/users_database.yml
    envsubst: [HOMELAB_ADMIN_NAME, HOMELAB_ADMIN_EMAIL, HOMELAB_ADMIN_PWHASH]
    owner: authelia:authelia
    mode: "0640"
    atomic: true
    on_change:
      - restart: authelia.service

  - src: target/authelia.service
    dest: /etc/systemd/system/authelia.service
    mode: "0644"
    on_change:
      - daemon_reload: true
      - restart: authelia.service

verify_active: authelia.service
