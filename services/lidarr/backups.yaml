# Backup specs for the lidarr LXC. SQLite engine — see services/navidrome
# /backups.yaml for the canonical pattern. We back up the three SQLite DBs
# that hold non-reproducible state:
#
#   lidarr/main.db    — artists, albums, wanted list, quality profiles
#   lidarr/logs.db    — operational history (less critical; small footprint)
#   slskd/catalog.db  — slskd's transfer history (re-derives on rescan but
#                        retention is convenient)
#
# Soularr has no DB (it's a stateless poller). What it might leave is a log
# file under /var/lib/soularr — not backed up.

- name: lidarr-main
  engine: sqlite
  host: lidarr
  src: /var/lib/lidarr/lidarr.db
  dest_dir: /var/lib/lidarr/backups
  retention:
    keep_last: 14
  schedule: "55 2 * * *"

- name: lidarr-logs
  engine: sqlite
  host: lidarr
  src: /var/lib/lidarr/logs.db
  dest_dir: /var/lib/lidarr/backups
  retention:
    keep_last: 7
  schedule: "55 2 * * *"

- name: slskd-catalog
  engine: sqlite
  host: lidarr
  src: /var/lib/slskd/data/catalog.db
  dest_dir: /var/lib/slskd/backups
  retention:
    keep_last: 7
  schedule: "55 2 * * *"
