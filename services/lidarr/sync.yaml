# Declarative sync spec for the lidarr LXC.
#
# Lidarr's own config.xml is seeded by bootstrap.yaml (one-shot, preserves
# the API key + nightly branch) and then managed by Lidarr itself — not
# synced from here. What we DO sync: slskd config + the two systemd units
# (lidarr.service, slskd.service).
#
# Tubifarry (Soulseek/YouTube plugin) is installed via Lidarr's web UI:
# System → Plugins → enter https://github.com/TypNull/Tubifarry → Install
# → restart Lidarr. Plugin updates are NOT automatic; pin via the same UI.
# This is a one-time post-deploy step, documented in docs/media-stack.md.

host: lidarr

files:
  - src: target/slskd.yml.tmpl
    dest: /etc/slskd/slskd.yml
    envsubst: [SOULSEEK_USERNAME, SOULSEEK_PASSWORD]
    owner: slskd:slskd
    mode: "0640"
    on_change:
      - restart: slskd.service

  - src: target/lidarr.service
    dest: /etc/systemd/system/lidarr.service
    mode: "0644"
    on_change:
      - daemon_reload: true
      - restart: lidarr.service

  - src: target/slskd.service
    dest: /etc/systemd/system/slskd.service
    mode: "0644"
    on_change:
      - daemon_reload: true
      - restart: slskd.service

verify_active: lidarr.service
