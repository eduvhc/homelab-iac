# Bootstrap spec for the lidarr LXC (Lidarr-nightly with Tubifarry plugin
# + slskd).
#
# Tubifarry is a Lidarr plugin that integrates slskd as a native indexer +
# download client — replaces the external soularr polling script with
# in-process Lidarr code. Cleaner than soularr, but requires Lidarr's
# `nightly` branch (the only branch with plugin support today).
#
# One-way switch caveat: once Lidarr's DB is opened by the nightly build,
# rolling back to master needs a pre-switch DB backup. Our backup runs
# nightly at 02:55 (see backups.yaml) — keep a snapshot before any branch
# experimentation.
#
# Lidarr is a self-contained .NET runtime tree (not a single binary), and
# slskd is a zipped binary — neither fits the typed `binaries:` directive
# (single tar.gz member). Both install via `commands:`.

apt:
  packages:
    - curl
    - ca-certificates
    - jq
    - tar
    - unzip
    - sqlite3                # for tools/lib/backups/sqlite.sh
    - libicu-dev             # Lidarr (.NET) i18n
    - mediainfo              # Lidarr media probing
    - libchromaprint-tools   # Lidarr fingerprinting (fpcalc)

groups:
  - {name: media, gid: 65000}

users:
  - {name: lidarr, system: true, no_create_home: true, shell: /usr/sbin/nologin, home: /var/lib/lidarr, extra_groups: [media]}
  - {name: slskd,  system: true, no_create_home: true, shell: /usr/sbin/nologin, home: /var/lib/slskd,  extra_groups: [media]}

dirs:
  - {path: /etc/lidarr,      owner: "lidarr:lidarr", mode: "0750"}
  - {path: /var/lib/lidarr,  owner: "lidarr:lidarr", mode: "0750"}
  - {path: /etc/slskd,       owner: "slskd:slskd",   mode: "0750"}
  - {path: /var/lib/slskd,   owner: "slskd:slskd",   mode: "0750"}
  # /srv/media/_incoming is the slskd downloads dir — Lidarr (Tubifarry's
  # import path) renames into /srv/media/music from here (same FS → atomic).
  # NOT created here: it's a sibling of /srv/media/{music,youtube} which
  # live on the host bind-mount and must be pre-created host-side with
  # `100000:165000 mode 2775` (container `root:media`). See
  # docs/media-stack.md → "Host setup". `install -d` from inside the
  # unprivileged LXC can't create here (container root = host UID 100000
  # has no write perm on /srv/media owned by host root:root 0755).

# Local random secrets — never leave the LXC. slskd reads its API + JWT
# keys at runtime via EnvironmentFile=. LIDARR_API_KEY seeds config.xml
# below so the value is predictable (Tubifarry talks to slskd directly,
# so Lidarr's own API key isn't strictly required externally — but pinning
# is still cleaner than letting Lidarr generate a fresh one we can't
# reference if we ever script against it).
random_secrets:
  - dest: /etc/lidarr-stack/secrets.env
    owner: "root:media"
    mode: "0640"
    if_missing: true
    entries:
      - {key: SLSKD_API_KEY,  length: 48}
      - {key: LIDARR_API_KEY, length: 32}
      # slskd JWT signing key is auto-generated by slskd on first run when
      # web.authentication.jwt.key is unset (schema default). Since our web
      # auth is disabled (Authelia at the gateway is the gate), the JWT
      # path is unused; no need to pin a key here.

commands:
  # Lidarr install — `nightly` branch (the only branch with plugin support
  # in 2026; required for Tubifarry). The servarr update endpoint streams
  # the right tarball for any branch, so we don't have to track the GitHub
  # asset naming scheme (which only publishes master builds).
  - if_missing_file: /opt/Lidarr/Lidarr
    shell: |
      curl -fsSL 'https://lidarr.servarr.com/v1/update/nightly/updatefile?os=linux&runtime=netcore&arch=x64' -o /tmp/lidarr.tar.gz
      tar -xzf /tmp/lidarr.tar.gz -C /opt
      rm -f /tmp/lidarr.tar.gz
      chown -R lidarr:lidarr /opt/Lidarr

  # slskd install — single binary in a zip.
  - if_missing_file: /opt/slskd/slskd
    shell: |
      _tag=$(curl -fsSL 'https://api.github.com/repos/slskd/slskd/releases/latest' | jq -r .tag_name)
      curl -fsSL "https://github.com/slskd/slskd/releases/download/${_tag}/slskd-${_tag}-linux-x64.zip" -o /tmp/slskd.zip
      install -d -m 0755 /opt/slskd
      unzip -q -o /tmp/slskd.zip -d /opt/slskd
      rm -f /tmp/slskd.zip
      chmod 0755 /opt/slskd/slskd
      chown -R slskd:slskd /opt/slskd

  # Seed Lidarr's config.xml with our pre-generated API key. Lidarr will
  # honor the existing ApiKey on first launch (otherwise it generates one
  # we can't predict, breaking any scripts that talk to Lidarr's API).
  # printf instead of heredoc — the bootstrap engine indents the entire
  # shell block by 2 spaces, which would push a heredoc's closing token
  # off column 0 and break termination.
  - if_missing_file: /etc/lidarr/config.xml
    shell: |
      . /etc/lidarr-stack/secrets.env
      printf '%s\n' \
        '<Config>' \
        '  <BindAddress>*</BindAddress>' \
        '  <Port>8686</Port>' \
        '  <SslPort>9898</SslPort>' \
        '  <EnableSsl>False</EnableSsl>' \
        "  <ApiKey>${LIDARR_API_KEY}</ApiKey>" \
        '  <AuthenticationMethod>External</AuthenticationMethod>' \
        '  <AuthenticationRequired>DisabledForLocalAddresses</AuthenticationRequired>' \
        '  <Branch>nightly</Branch>' \
        '  <LogLevel>info</LogLevel>' \
        '  <SslCertPath></SslCertPath>' \
        '  <SslCertPassword></SslCertPassword>' \
        '  <UrlBase></UrlBase>' \
        '  <InstanceName>Lidarr</InstanceName>' \
        '</Config>' > /etc/lidarr/config.xml
      chown lidarr:lidarr /etc/lidarr/config.xml
      chmod 0640 /etc/lidarr/config.xml

systemd:
  daemon_reload: true
  enable: [lidarr, slskd]
