# Bootstrap spec for the lidarr LXC (Lidarr + slskd + soularr).
#
# All three components run in one LXC because they share an event chain
# (Lidarr's wanted list → soularr → slskd) and the per-process resource
# footprint is small. Splitting them across LXCs would only add SSH hops
# for soularr's polling loop.
#
# Lidarr is shipped as a self-contained .NET runtime tree (not a single
# binary), and slskd as a zipped binary — neither fits the typed
# `binaries:` directive (which expects a single tar.gz member). They go
# via `commands:` instead. Soularr is a Python script — clone + uv venv.

apt:
  packages:
    - curl
    - ca-certificates
    - jq
    - tar
    - unzip
    - sqlite3                # for tools/lib/backups/sqlite.sh
    - gettext-base           # envsubst for soularr config render at ExecStartPre
    - git                    # clone soularr
    - python3
    - python3-venv           # uv venv fallback
    - libicu-dev             # Lidarr (.NET) i18n
    - mediainfo              # Lidarr media probing
    - libchromaprint-tools   # Lidarr fingerprinting (fpcalc)

groups:
  - {name: media, gid: 65000}

users:
  - {name: lidarr,  system: true, no_create_home: true, shell: /usr/sbin/nologin, home: /var/lib/lidarr,  extra_groups: [media]}
  - {name: slskd,   system: true, no_create_home: true, shell: /usr/sbin/nologin, home: /var/lib/slskd,   extra_groups: [media]}
  - {name: soularr, system: true, no_create_home: true, shell: /usr/sbin/nologin, home: /var/lib/soularr, extra_groups: [media]}

dirs:
  - {path: /etc/lidarr,       owner: "lidarr:lidarr",   mode: "0750"}
  - {path: /var/lib/lidarr,   owner: "lidarr:lidarr",   mode: "0750"}
  - {path: /etc/slskd,        owner: "slskd:slskd",     mode: "0750"}
  - {path: /var/lib/slskd,    owner: "slskd:slskd",     mode: "0750"}
  - {path: /etc/soularr,      owner: "soularr:soularr", mode: "0750"}
  - {path: /var/lib/soularr,  owner: "soularr:soularr", mode: "0750"}
  # Lidarr-managed downloads dir on the shared media volume. slskd writes
  # here; Lidarr scans + imports into /srv/media/music as renames (same FS).
  - {path: /srv/media/_incoming, owner: "slskd:media", mode: "2775"}

# Local random API keys — never leave the LXC. slskd.yml + the Lidarr
# config.xml seeded below reference these via env vars at runtime. The
# combined env file is mode 0640 owned by root:media so all three service
# users can read it via systemd EnvironmentFile=.
random_secrets:
  - dest: /etc/lidarr-stack/secrets.env
    owner: "root:media"
    mode: "0640"
    if_missing: true
    entries:
      - {key: SLSKD_API_KEY,   length: 48}
      - {key: LIDARR_API_KEY,  length: 32}
      - {key: SLSKD_JWT_KEY,   length: 64}

commands:
  # Lidarr install — self-contained .NET tree under /opt/Lidarr.
  - if_missing_file: /opt/Lidarr/Lidarr
    shell: |
      _tag=$(curl -fsSL 'https://api.github.com/repos/Lidarr/Lidarr/releases/latest' | jq -r .tag_name)
      _tag_num=${_tag#v}
      curl -fsSL "https://github.com/Lidarr/Lidarr/releases/download/${_tag}/Lidarr.master.${_tag_num}.linux-core-x64.tar.gz" -o /tmp/lidarr.tar.gz
      tar -xzf /tmp/lidarr.tar.gz -C /opt
      rm -f /tmp/lidarr.tar.gz
      chown -R lidarr:lidarr /opt/Lidarr

  # slskd install — single binary in a zip.
  - if_missing_file: /opt/slskd/slskd
    shell: |
      _tag=$(curl -fsSL 'https://api.github.com/repos/slskd/slskd/releases/latest' | jq -r .tag_name)
      curl -fsSL "https://github.com/slskd/slskd/releases/download/${_tag}/slskd-${_tag}-linux-x64.zip" -o /tmp/slskd.zip
      install -d -m 0755 /opt/slskd
      unzip -q -o /tmp/slskd.zip -d /opt/slskd
      rm -f /tmp/slskd.zip
      chmod 0755 /opt/slskd/slskd
      chown -R slskd:slskd /opt/slskd

  # uv (Astral) install — single-script installer to /root/.local/bin. We
  # symlink to /usr/local/bin so soularr.service can call it without env
  # gymnastics. Idempotent — re-install is harmless.
  - if_missing_file: /usr/local/bin/uv
    shell: |
      curl -LsSf https://astral.sh/uv/install.sh | sh
      ln -sf /root/.local/bin/uv /usr/local/bin/uv

  # Soularr clone + venv. Pin to a release tag for reproducibility — the
  # script is small and the API surface (Lidarr+slskd) is stable, so we
  # don't auto-track main.
  - if_missing_file: /opt/soularr/soularr.py
    shell: |
      _tag=$(curl -fsSL 'https://api.github.com/repos/mrusse/soularr/releases/latest' | jq -r .tag_name)
      install -d -o soularr -g soularr -m 0755 /opt/soularr
      git clone --depth=1 --branch "$_tag" https://github.com/mrusse/soularr.git /opt/soularr.tmp
      cp -r /opt/soularr.tmp/. /opt/soularr/
      rm -rf /opt/soularr.tmp
      chown -R soularr:soularr /opt/soularr
      # Create venv as soularr user (uv reads $HOME — we override).
      su -s /bin/sh soularr -c 'HOME=/var/lib/soularr cd /opt/soularr && uv venv && uv pip install -r requirements.txt'

  # Seed Lidarr's config.xml with our pre-generated API key. Lidarr will
  # honor the existing ApiKey on first launch (otherwise it generates one
  # we can't predict, breaking the soularr config rendered at runtime).
  # printf instead of heredoc — the bootstrap engine indents the entire
  # shell block by 2 spaces, which would push a heredoc's closing token
  # off column 0 and break termination.
  - if_missing_file: /etc/lidarr/config.xml
    shell: |
      . /etc/lidarr-stack/secrets.env
      printf '%s\n' \
        '<Config>' \
        '  <BindAddress>*</BindAddress>' \
        '  <Port>8686</Port>' \
        '  <SslPort>9898</SslPort>' \
        '  <EnableSsl>False</EnableSsl>' \
        "  <ApiKey>${LIDARR_API_KEY}</ApiKey>" \
        '  <AuthenticationMethod>External</AuthenticationMethod>' \
        '  <AuthenticationRequired>DisabledForLocalAddresses</AuthenticationRequired>' \
        '  <Branch>master</Branch>' \
        '  <LogLevel>info</LogLevel>' \
        '  <SslCertPath></SslCertPath>' \
        '  <SslCertPassword></SslCertPassword>' \
        '  <UrlBase></UrlBase>' \
        '  <InstanceName>Lidarr</InstanceName>' \
        '</Config>' > /etc/lidarr/config.xml
      chown lidarr:lidarr /etc/lidarr/config.xml
      chmod 0640 /etc/lidarr/config.xml

systemd:
  daemon_reload: true
  enable: [lidarr, slskd, soularr.timer]
