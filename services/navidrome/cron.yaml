# Cron entries owned by the navidrome service. Assembled into
# /etc/cron.d/iac on the ops LXC by tools/lib/assemble-crons (called by
# apply.sh phase 8).

- name: navidrome-backup-sqlite
  schedule: "50 2 * * *"       # daily 02:50 UTC — 10 min before vzdump's 03:00
  command: services/navidrome/backup-sqlite.sh
  log: /var/log/navidrome-backup-sqlite.log
  description: |
    Inner backup of Navidrome's SQLite DB (users, ratings, playlists,
    scrobbles). sqlite3 .backup → /var/lib/navidrome/backups/ on the
    Navidrome LXC (captured by next vzdump). Retention: 14 dumps.
    See docs/backups.md.
