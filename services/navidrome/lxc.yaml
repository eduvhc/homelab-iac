# LXC spec for Navidrome (self-hosted music server, OpenSubsonic API).
# Auth: reverse-proxy via Authelia at music.${HOMELAB_DOMAIN}.
#
# Storage layout (state vs media separation — canonical pattern for media
# servers, see docs/3-node-plan.md and Navidrome backup docs):
#   rootfs (disk_gb)  → binary, config, SQLite DB, Navidrome's own DB
#                       backups in /var/lib/navidrome/backups
#                       → included in vzdump
#   mp0 (bind mount)  → /var/lib/navidrome/media → /srv/media (host)
#                       Shared with services/lidarr/ + services/ytdl-sub/.
#                       Contents are reproducible (ripped originals exist
#                       elsewhere) → not in vzdump.
# What cannot be lost is the DB (ratings, playlists, scrobbles), which
# Navidrome backs up natively to rootfs on a schedule.
#
# Library layout: /srv/media/music (Lidarr-managed FLAC) and
# /srv/media/youtube (ytdl-sub-managed) appear as two libraries in
# Navidrome via the [[Libraries]] block in target/navidrome.toml.tmpl.

vm_id: 104
hostname: navidrome
cores: 2
memory_mb: 1024
swap_mb: 512
disk_gb: 8
node: pve
tags: [media, music]
features:
  nesting: false
  keyctl: false
mount_points:
  - path: /var/lib/navidrome/media
    host_path: /srv/media
