# Template for iac/secrets.sops.yaml. Plaintext, committed.
#
# Used by tools/seed-secrets.sh to bootstrap a fresh sops file:
#   1. Operator clones the repo + adds an age key.
#   2. tools/seed-secrets.sh copies this template to iac/secrets.sops.yaml
#      and encrypts it with the recipients in ../.sops.yaml.
#   3. Operator runs `sops iac/secrets.sops.yaml` and fills REQUIRED values.
#   4. Operator re-runs tools/seed-secrets.sh to validate + auto-fill AUTO.
#
# encrypted_regex in .sops.yaml is `^[A-Z][A-Z0-9_]+$`. Caps-only keys are
# encrypted. Comments and lowercase keys stay plaintext (the layout below
# is preserved as readable structure in the encrypted file).

# ── REQUIRED · platform credentials ─────────────────────────────────────────

# CLOUDFLARE_API_TOKEN: required scopes
#   Account / Cloudflare Tunnel : Edit
#   Account / Zero Trust        : Edit
#   Account / Cloudflare R2     : Edit  (for the tofu state bucket)
#   User    / API Tokens        : Edit  (to mint the scoped R2 token)
#   Zone    / DNS               : Edit
#   Create at https://dash.cloudflare.com/profile/api-tokens
CLOUDFLARE_API_TOKEN: ""

# PVE_ROOT_PASSWORD: root@pam password set at PVE install. The bpg/proxmox
#   provider can't use API tokens for some LXC ops (hardcoded PVE limit).
PVE_ROOT_PASSWORD: ""

# ── REQUIRED · homelab identifiers ──────────────────────────────────────────

# HOMELAB_DOMAIN: root DNS zone served by this homelab. Used by tofu
#   (CF zone lookup, tunnel DNS records) and by service config templates
#   (envsubst). Single source. Change here to migrate the whole homelab
#   to a new domain.
HOMELAB_DOMAIN: ""

# NTFY_TOPIC: unguessable slug for drift alerts. Subscribe at
#   https://ntfy.sh/<topic> on your phone. Threat model: spam only.
#   Suggestion: printf 'homelab-drift-%s' "$(openssl rand -hex 8)"
NTFY_TOPIC: ""

# ── REQUIRED · admin user (Coolify + Authelia) ──────────────────────────────

# HOMELAB_ADMIN_NAME / EMAIL: identity for the admin user that bootstrap-user.sh
#   creates on first apply.
HOMELAB_ADMIN_NAME: ""
HOMELAB_ADMIN_EMAIL: ""

# HOMELAB_ADMIN_PASSWORD: password for the admin user above.
#   Reactive: change here → next tools/apply.sh propagates to both Coolify
#   (bootstrap-user.sh idempotent Hash::check + update) and Authelia
#   (sync.sh regenerates HOMELAB_ADMIN_PWHASH and pushes users_database.yml).
HOMELAB_ADMIN_PASSWORD: ""

# ── AUTO-managed · don't hand-edit (scripts/tofu overwrite) ─────────────────

# TOFU_STATE_PASSPHRASE: encrypts tofu state in R2 (PBKDF2-AES-GCM, defense
#   in depth above the R2 token). Pure plumbing — nothing reads this except
#   the tofu encryption{} block via TF_VAR_tf_state_passphrase. Auto-generated
#   by tools/seed-secrets.sh (openssl rand -base64 24). Lose this AND you
#   lose access to the existing state objects in R2.
TOFU_STATE_PASSPHRASE: ""

# R2_ACCOUNT_ID: Cloudflare account id (32-hex). Auto-derived by
#   tools/seed-secrets.sh from HOMELAB_DOMAIN via /zones?name=...
#   Needed for the R2 S3 endpoint URL
#   (https://<account_id>.r2.cloudflarestorage.com). Tofu derives its own
#   copy from the cloudflare_zone data source.
R2_ACCOUNT_ID: ""

# R2_ACCESS_KEY_ID / R2_SECRET_ACCESS_KEY: S3-compat creds for the tofu
#   state bucket. Minted by tools/seed-secrets.sh against the CF API.
#     access_key_id     = token.id
#     secret_access_key = sha256(token.value)
R2_ACCESS_KEY_ID: ""
R2_SECRET_ACCESS_KEY: ""

# HOMELAB_ADMIN_PWHASH / _SRC: Authelia argon2id digest derived from
#   HOMELAB_ADMIN_PASSWORD by services/gateway/authelia/sync.sh.
#   _SRC is sha256(password-at-hash-time). Hash is only regenerated when
#   the password changes (argon2id uses a random salt; would otherwise
#   drift on every sync run).
HOMELAB_ADMIN_PWHASH: ""
HOMELAB_ADMIN_PWHASH_SRC: ""

# COOLIFY_API_TOKEN: rotated on every apply by services/coolify/rotate-token.sh
#   via php artisan tinker on the Coolify host. 30-day TTL.
#   Format: "<id>|<plain-token>" (split on | when consuming).
COOLIFY_API_TOKEN: ""
