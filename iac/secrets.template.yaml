# Template for iac/secrets.sops.yaml. Plaintext, committed.
#
# Used by tools/seed-secrets.sh to bootstrap a fresh sops file:
#   1. Operator clones the repo + adds an age key.
#   2. tools/seed-secrets.sh copies this template to iac/secrets.sops.yaml
#      and encrypts it with the recipients in ../.sops.yaml.
#   3. Operator runs `sops iac/secrets.sops.yaml` and fills REQUIRED values.
#   4. Operator re-runs tools/seed-secrets.sh to validate + mint R2 backend.
#
# encrypted_regex in .sops.yaml is `^[A-Z][A-Z0-9_]+$` — caps-only keys are
# encrypted; comments and lowercase keys stay plaintext (so the layout
# below is preserved as readable structure in the encrypted file).

# ── REQUIRED · operator-provided (set once, rarely rotated) ─────────────────

# TOFU_STATE_PASSPHRASE: encrypts tofu state in R2 (PBKDF2-AES-GCM).
#   Rotating = re-encrypting all state. Lose this = state unreadable.
#   Generate: openssl rand -base64 24
TOFU_STATE_PASSPHRASE: ""

# CLOUDFLARE_API_TOKEN: required scopes
#   Account / Cloudflare Tunnel : Edit
#   Account / Zero Trust        : Edit
#   Account / Cloudflare R2     : Edit  (for the tofu state bucket)
#   User    / API Tokens        : Edit  (to mint the scoped R2 token)
#   Zone    / DNS               : Edit
#   Create at https://dash.cloudflare.com/profile/api-tokens
CLOUDFLARE_API_TOKEN: ""

# PVE_ROOT_PASSWORD: root@pam password set at PVE install (bpg/proxmox
#   provider can't use API tokens for some LXC ops — hardcoded PVE limit).
PVE_ROOT_PASSWORD: ""

# HOMELAB_ADMIN_PASSWORD: bootstrap-only password for the Coolify+Authelia
#   admin user. Change in UI after first login; the value here is no longer
#   authoritative. Suggestion: openssl rand -base64 24
HOMELAB_ADMIN_PASSWORD: ""

# ── REQUIRED · identifiers ──────────────────────────────────────────────────

# R2_ACCOUNT_ID: Cloudflare account id (32-hex). Dash → Workers → right panel.
R2_ACCOUNT_ID: ""

# HOMELAB_ADMIN_NAME / EMAIL: identity for the Coolify+Authelia admin user.
HOMELAB_ADMIN_NAME: ""
HOMELAB_ADMIN_EMAIL: ""

# NTFY_TOPIC: unguessable slug for drift alerts. Subscribe at
#   https://ntfy.sh/<topic> on your phone. Threat model: spam only.
#   Suggestion: printf 'homelab-drift-%s' "$(openssl rand -hex 8)"
NTFY_TOPIC: ""

# ── AUTO-managed · don't hand-edit ──────────────────────────────────────────
# Populated by scripts/tofu on each run. Hand edits are overwritten.

# R2_ACCESS_KEY_ID / R2_SECRET_ACCESS_KEY: S3-compat creds for the tofu state
# bucket. Minted by tools/seed-secrets.sh against the CF API:
#   access_key_id     = token.id
#   secret_access_key = sha256(token.value)
R2_ACCESS_KEY_ID: ""
R2_SECRET_ACCESS_KEY: ""

# COOLIFY_API_TOKEN: rotated on every apply by services/coolify/rotate-token.sh
# (mints a fresh 30-day token via php artisan tinker on the Coolify host).
COOLIFY_API_TOKEN: ""
