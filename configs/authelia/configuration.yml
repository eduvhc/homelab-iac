theme: dark
server:
  address: tcp://0.0.0.0:9091
log:
  level: info
totp:
  issuer: iedora.com
authentication_backend:
  password_reset:
    disable: true
  file:
    path: /etc/authelia/users_database.yml
session:
  cookies:
  - domain: iedora.com
    authelia_url: https://auth.iedora.com
storage:
  local:
    path: /var/lib/authelia/db.sqlite3
notifier:
  filesystem:
    filename: /var/lib/authelia/notifications.txt
access_control:
  default_policy: deny
  rules:
  - domain:
    - auth.iedora.com
    policy: bypass
  - domain:
    - '*.iedora.com'
    policy: one_factor
identity_providers:
  oidc:
    jwks:
    - key_id: main
      algorithm: RS256
      use: sig
      key: |
        {{- fileContent "/etc/authelia/oidc-private.pem" | nindent 8 }}
    clients:
    - client_id: coolify
      client_name: Coolify
      token_endpoint_auth_method: client_secret_post
      client_secret: $pbkdf2-sha512$310000$1dV1QB3D/YeONDS0mvQPnw$K6ro1bSsztpEUxdwit./VoeqbkD.Ns3rfGeXP8ArPDJoybY4hhY9nomfUZKOOXfV0FMB.JlAqwv3ZWGhFuVGcw
      public: false
      authorization_policy: one_factor
      require_pkce: true
      pkce_challenge_method: S256
      redirect_uris:
      - https://coolify.iedora.com/auth/oidc/callback
      scopes:
      - openid
      - profile
      - email
      userinfo_signed_response_alg: none
