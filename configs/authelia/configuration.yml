theme: dark
server:
  address: tcp://0.0.0.0:9091
log:
  level: info
totp:
  issuer: iedora.com
authentication_backend:
  password_reset:
    disable: true
  file:
    path: /etc/authelia/users_database.yml
session:
  cookies:
    - domain: iedora.com
      authelia_url: https://auth.iedora.com
storage:
  local:
    path: /var/lib/authelia/db.sqlite3
notifier:
  filesystem:
    filename: /var/lib/authelia/notifications.txt
access_control:
  default_policy: deny
  rules:
    - domain:
        - "auth.iedora.com"
      policy: bypass
    - domain:
        - "*.iedora.com"
      policy: two_factor
