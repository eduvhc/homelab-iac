# Pre-commit hooks for iedora-iac.
# Install: `pip install pre-commit && pre-commit install` (or `brew install pre-commit`)
# Run on demand: `pre-commit run --all-files`
#
# `tofu` is required in PATH for the terraform hooks below. The hook IDs are
# named `terraform_*` for historical reasons but they accept the `--args=-tofu`
# flag is unnecessary because we override the binary via TF_BIN env (see below).
# Most pre-commit-terraform hooks auto-detect tofu if it's the only one in PATH;
# on machines with both installed, set TF_BIN=tofu before `pre-commit run`.

repos:
  - repo: https://github.com/antonbabenko/pre-commit-terraform
    rev: v1.96.1
    hooks:
      - id: terraform_fmt
        args:
          - --args=-recursive
      - id: terraform_validate
        # Skip in pre-commit because it requires `init` which fetches providers
        # from the registry. CI runs this with mocked credentials.
        stages: [manual]
      - id: terraform_tflint
        args:
          - --args=--minimum-failure-severity=warning
        stages: [manual]

  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.21.2
    hooks:
      - id: gitleaks

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
        exclude: ^tools/lib/assemble-crons/vendor/
      - id: end-of-file-fixer
        exclude: ^tools/lib/assemble-crons/vendor/
      - id: check-yaml
        exclude: ^services/gateway/authelia/configuration\.yml$  # uses Go templates ({{ ... }})
      - id: check-merge-conflict
      - id: check-added-large-files
        args: [--maxkb=512]
        exclude: ^tools/lib/assemble-crons/vendor/

  - repo: https://github.com/koalaman/shellcheck-precommit
    rev: v0.10.0
    hooks:
      - id: shellcheck
        args: [--severity=warning]
